<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearningApps Repository</title>
    <!-- Google Fonts: Roboto (muss lokal eingebunden werden) -->
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        main {
            width: 90%;
            max-width: 800px;
            margin-top: 2rem;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .app-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .icon {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
            color: var(--accent-color);
        }

        h2 {
            margin: 0.5rem 0;
            font-size: 1.2rem;
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <header>
        <h1>Meine LearningApps</h1>
        <p>Übersicht der interaktiven Lernmaterialien</p>
    </header>

    <main>
        <div class="app-grid">
            <!-- Link zum Phasendiagramm -->
            <a href="Phasendiagramm.html" class="app-card">
                <!-- Lucide Icon: Box/Package Ersatz -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                <h2>Phasendiagramm</h2>
                <p>Interaktive Übung zum Zustandsdiagramm.</p>
            </a>

            <!-- Hier können später weitere Apps nach demselben Muster hinzugefügt werden -->
        </div>
    </main>

    <footer>
        <p>Gehostet auf GitHub Pages</p>
    </footer>

</body>
</html>
