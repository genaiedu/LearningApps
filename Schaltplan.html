<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HQ-Matrix | Energiefluss-Kontrolle</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @font-face { font-family: 'Inter'; src: url('Fonts/inter-v20-latin-regular.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Inter'; src: url('Fonts/inter-v20-latin-500.woff2') format('woff2'); font-weight: 500; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Inter'; src: url('Fonts/inter-v20-latin-600.woff2') format('woff2'); font-weight: 600; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Poppins'; src: url('Fonts/poppins-v24-latin-600.woff2') format('woff2'); font-weight: 600; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Poppins'; src: url('Fonts/poppins-v24-latin-700.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Poppins'; src: url('Fonts/poppins-v24-latin-800.woff2') format('woff2'); font-weight: 800; font-style: normal; font-display: swap; }

    :root {
      --theme-blue: #38bdf8; 
      --accent: var(--theme-blue);
      --accent-soft: color-mix(in srgb, var(--theme-blue) 15%, transparent);
      --accent-glow: color-mix(in srgb, var(--theme-blue) 35%, transparent);
      --accent-gradient: linear-gradient(135deg, #0284c7, #38bdf8);

      --c-blue: #7dd3fc; --c-amber: #fbbf24; --c-green: #34d399;
      --c-purple: #a78bfa; --c-pink: #f472b6; --c-red: #f87171;

      --bg-color: #020617;
      --bg-grad-1: #081627; --bg-grad-2: #041222; 
      --bg-grad-3: #0a192f; --bg-grad-4: #020617; 

      --glass-bg: rgba(15, 23, 42, 0.65);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);

      --text-main: #f8fafc; --text-dim: #cbd5e1; --text-muted: #94a3b8;
      --sidebar-bg: rgba(2, 6, 23, 0.95);

      --grad-1: rgba(56, 189, 248, 0.15); --grad-2: rgba(14, 165, 233, 0.15); --grad-3: rgba(167, 139, 250, 0.12);  

      --sidebar-width: 320px;
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-display: 'Poppins', system-ui, sans-serif;

      --grid-line: rgba(255, 255, 255, 0.05);
      --wire-color: #38bdf8; --component-stroke: #dbeafe;
      --component-fill: rgba(15,23,42,0.92);
      --component-halo: rgba(56,189,248,0.25);
    }

    body.light {
      --theme-blue: #1a6fb5; --accent: var(--theme-blue);
      --accent-soft: color-mix(in srgb, var(--theme-blue) 12%, transparent);
      --accent-glow: color-mix(in srgb, var(--theme-blue) 30%, transparent);
      --accent-gradient: linear-gradient(135deg, #0a4a80, #1a6fb5);

      --bg-color: #f8fafc;
      --bg-grad-1: #f0f9ff; --bg-grad-2: #e0f2fe; --bg-grad-3: #f8fafc; --bg-grad-4: #eef2ff;

      --glass-bg: rgba(255, 255, 255, 0.85); --glass-border: rgba(255, 255, 255, 0.9);
      --glass-shadow: 0 10px 40px rgba(15, 23, 42, 0.05); 

      --text-main: #0f172a; --text-dim: #334155; --text-muted: #64748b;
      --sidebar-bg: rgba(255, 255, 255, 0.95);

      --grad-1: rgba(26, 111, 181, 0.2); --grad-2: rgba(14, 165, 233, 0.2); --grad-3: rgba(139, 92, 246, 0.2);

      --grid-line: rgba(15, 23, 42, 0.08); --wire-color: #0284c7; --component-stroke: #1e293b;
      --component-fill: rgba(255,255,255,0.96);
      --component-halo: rgba(2,132,199,0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { width: 100%; height: 100%; overflow: hidden; position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
    body { font-family: var(--font-sans); background: linear-gradient(-45deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3), var(--bg-grad-4)); background-size: 300% 300%; color: var(--text-main); animation: gradientBG 24s ease infinite; }
    h1, h2, h3, h4, h5, h6 { font-family: var(--font-display); }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent-soft); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes drift1 { 0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); } 33% { transform: translate(5vw, 8vh) scale(1.1) rotate(5deg); } 66% { transform: translate(-3vw, -4vh) scale(0.95) rotate(-5deg); } }
    @keyframes drift2 { 0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); } 33% { transform: translate(-6vw, -4vh) scale(1.15) rotate(-5deg); } 66% { transform: translate(4vw, 6vh) scale(0.9) rotate(5deg); } }
    @keyframes drift3 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(3vw, -6vh) scale(1.08); } }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

    .bg-blobs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
    .bg-blobs .blob { position: absolute; border-radius: 50%; filter: blur(120px); }
    .bg-blobs .blob-1 { width: 60vw; height: 60vw; top: -20vh; left: -15vw; background: var(--grad-1); animation: drift1 28s ease-in-out infinite; }
    .bg-blobs .blob-2 { width: 55vw; height: 55vw; bottom: -20vh; right: -15vw; background: var(--grad-2); animation: drift2 24s ease-in-out infinite; }
    .bg-blobs .blob-3 { width: 50vw; height: 50vw; top: 30vh; left: 20vw; background: var(--grad-3); animation: drift3 32s ease-in-out infinite; }

    .progress-bar { position: absolute; top: 0; left: 0; height: 4px; width: 100%; background: var(--accent-gradient); z-index: 1200; box-shadow: 0 0 10px var(--accent-glow); }

    .app-container { display: flex; width: 100vw; height: 100vh; position: absolute; inset: 0; z-index: 10; overflow: hidden; }

    .sidebar { width: var(--sidebar-width); height: 100vh; flex-shrink: 0; background: var(--sidebar-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; z-index: 1000; box-shadow: 4px 0 40px rgba(0,0,0,0.06); }
    .sidebar-header { padding: 2.5rem 2rem 1.5rem; border-bottom: 1px solid var(--glass-border); position: relative; overflow: hidden; flex-shrink: 0; }
    .sidebar-header .school-name { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.16em; color: var(--accent); margin-bottom: 0.6rem; font-weight: 700; }
    .sidebar-header .course-title { font-family: var(--font-display); font-size: 1.8rem; line-height: 1.1; font-weight: 800; color: var(--text-main); letter-spacing: -0.02em; }

    .sidebar-content { flex: 1; overflow-y: auto; padding: 1.5rem 0; overscroll-behavior: contain; touch-action: pan-y; }
    .nav-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-muted); padding: 0 2rem 0.75rem; font-weight: 700; }

    .main-area { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; min-height: 0; }
    .glass-header { height: 70px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; background: var(--glass-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); z-index: 50; }

    .canvas-container { flex: 1; position: relative; overflow: hidden; min-width: 0; min-height: 0; background: rgba(0,0,0,0.1); touch-action: none; }

    .lucide { stroke-width: 2.2; }

    .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; padding: 0 1.5rem 2rem; }
    .tool-btn { display: flex; align-items: center; gap: 0.75rem; padding: 0.85rem 1rem; background: transparent; border: 1px solid var(--glass-border); border-radius: 14px; color: var(--text-dim); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); touch-action: manipulation; }
    .tool-btn:hover { background: var(--glass-bg); color: var(--text-main); transform: translateY(-2px); }
    .tool-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); box-shadow: 0 8px 25px var(--accent-glow); }

    .danger-btn { width: 100%; padding: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; background: color-mix(in srgb, var(--c-red) 10%, transparent); border: 1px solid color-mix(in srgb, var(--c-red) 30%, transparent); color: var(--c-red); border-radius: 14px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; touch-action: manipulation; flex-shrink: 0; }
    .danger-btn:hover { background: var(--c-red); color: white; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(248, 113, 113, 0.4); }

    .zoom-controls { position: absolute; bottom: 24px; right: 24px; z-index: 100; display: flex; flex-direction: column; gap: 8px; background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 6px; border-radius: 16px; border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); }
    .zoom-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; color: var(--text-dim); border-radius: 10px; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
    .zoom-btn:hover { background: var(--accent-soft); color: var(--accent); }

    .component-svg { overflow: visible; filter: drop-shadow(0 0 8px var(--component-halo)); }
    .component-backplate { fill: var(--component-fill); stroke: color-mix(in srgb, var(--wire-color) 42%, transparent); stroke-width: 1.5; }
    .component-dot { fill: var(--wire-color); stroke: var(--component-fill); stroke-width: 1.6; }
    .wire-line { stroke: var(--wire-color); stroke-width: 5; stroke-linecap: square; stroke-linejoin: miter; }
    .wire-round { stroke: var(--wire-color); stroke-width: 4.5; stroke-linecap: round; stroke-linejoin: round; }

    @media (max-width: 768px) {
      .app-container { flex-direction: column; }
      .sidebar { width: 100%; height: auto; max-height: 45vh; border-right: none; border-bottom: 1px solid var(--glass-border); }
      .sidebar-header { display: none; }
      .tool-grid { grid-template-columns: repeat(4, 1fr); padding: 0 1rem 1rem; gap: 0.5rem; }
      .tool-btn { flex-direction: column; text-align: center; gap: 0.4rem; padding: 0.5rem; font-size: 0.65rem; }
      .nav-label { padding: 0 1rem 0.5rem; }
      .zoom-controls { bottom: 16px; right: 16px; flex-direction: row; }
    }
  </style>
</head>
<body class="select-none"> 
  <div class="progress-bar"></div>

  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ name, className = "", size = 20 }) => {
      const wrapperRef = useRef(null);

      useEffect(() => {
        let attempts = 0;
        const tryRenderIcon = () => {
          if (window.lucide && wrapperRef.current) {
            wrapperRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
            window.lucide.createIcons({
              root: wrapperRef.current,
              attrs: { class: className, width: size, height: size, 'stroke-width': 2.2 }
            });
          } else if (attempts < 15) {
            attempts++;
            setTimeout(tryRenderIcon, 50);
          }
        };
        tryRenderIcon();
      }, [name, className, size]);

      return <span ref={wrapperRef} className="inline-flex items-center justify-center pointer-events-none" style={{ width: size, height: size }}></span>;
    };

    const DIR_N = 0, DIR_NE = 1, DIR_E = 2, DIR_SE = 3, DIR_S = 4, DIR_SW = 5, DIR_W = 6, DIR_NW = 7;
    const getCellPorts = (cell) => {
      if (!cell) return [];
      if (cell.type === 'wire') return [0, 1, 2, 3, 4, 5, 6, 7];
      const rot = cell.rot;
      switch (cell.type) {
        case 'source': case 'bulb': case 'switch': return [rot, (rot + 4) % 8];
        case 'wechselschalter': return [rot, (rot + 2) % 8, (rot + 4) % 8]; 
        case 'kreuzschalter': return [(0 + rot) % 8, (2 + rot) % 8, (4 + rot) % 8, (6 + rot) % 8];
        default: return [];
      }
    };
    const hasPort = (cell, dir) => getCellPorts(cell).includes(dir);
    const getInternalConns = (cell) => {
      if (!cell) return [];
      const rot = cell.rot;
      switch (cell.type) {
        case 'switch': return cell.state ? [[rot, (rot + 4) % 8]] : [];
        case 'wechselschalter': return cell.state ? [[rot, (rot + 2) % 8]] : [[rot, (rot + 4) % 8]];
        case 'kreuzschalter': return cell.state ? [[(0 + rot) % 8, (2 + rot) % 8], [(4 + rot) % 8, (6 + rot) % 8]] : [[(0 + rot) % 8, (4 + rot) % 8], [(2 + rot) % 8, (6 + rot) % 8]]; 
        default: return [];
      }
    };

    const solveLinearSystem = (A, b) => {
      const n = A.length;
      for (let i = 0; i < n; i++) {
        let maxEl = Math.abs(A[i][i]), maxRow = i;
        for (let k = i + 1; k < n; k++) {
          if (Math.abs(A[k][i]) > maxEl) { maxEl = Math.abs(A[k][i]); maxRow = k; }
        }
        for (let k = i; k < n; k++) {
          const tmp = A[maxRow][k]; A[maxRow][k] = A[i][k]; A[i][k] = tmp;
        }
        const tmp = b[maxRow]; b[maxRow] = b[i]; b[i] = tmp;
        if (Math.abs(A[i][i]) < 1e-12) continue; 
        for (let k = i + 1; k < n; k++) {
          const c = -A[k][i] / A[i][i];
          for (let j = i; j < n; j++) {
            if (i === j) A[k][j] = 0;
            else A[k][j] += c * A[i][j];
          }
          b[k] += c * b[i];
        }
      }
      const x = new Array(n).fill(0);
      for (let i = n - 1; i >= 0; i--) {
        if (Math.abs(A[i][i]) < 1e-12) { x[i] = 0; continue; }
        x[i] = b[i] / A[i][i];
        for (let k = i - 1; k >= 0; k--) b[k] -= A[k][i] * x[i];
      }
      return x;
    };

    function App() {
      const [cells, setCells] = useState({});
      const [tool, setTool] = useState('pan'); 
      const [simState, setSimState] = useState({ shortCircuit: false, bulbPowers: {} });
      const [isLightMode, setIsLightMode] = useState(false);
      const [showLegal, setShowLegal] = useState(false);

      const [scale, setScale] = useState(1);
      const [offset, setOffset] = useState({ x: 0, y: 0 });

      const viewportRef = useRef(null);
      const isDraggingViewport = useRef(false);
      const dragStartPos = useRef({ x: 0, y: 0 });
      const isDrawing = useRef(false);

      const scaleRef = useRef(1);
      const offsetRef = useRef({ x: 0, y: 0 });

      const GRID_W = 30, GRID_H = 30, CELL_SIZE = 40;

      useEffect(() => { scaleRef.current = scale; }, [scale]);
      useEffect(() => { offsetRef.current = offset; }, [offset]);

      useEffect(() => {
        const preventNativeZoom = (e) => { if (e.touches && e.touches.length > 1) e.preventDefault(); };
        const preventTrackpadZoom = (e) => { if (e.ctrlKey || e.metaKey) e.preventDefault(); };
        document.addEventListener('touchmove', preventNativeZoom, { passive: false });
        document.addEventListener('wheel', preventTrackpadZoom, { passive: false });
        return () => {
          document.removeEventListener('touchmove', preventNativeZoom);
          document.removeEventListener('wheel', preventTrackpadZoom);
        };
      }, []);

      const centerGrid = () => {
        const sidebarW = window.innerWidth > 768 ? 320 : 0;
        const canvasW = window.innerWidth - sidebarW;
        const screenH = window.innerHeight;
        const initialScale = window.innerWidth < 768 ? 0.6 : 1;
        setScale(initialScale);
        setOffset({ x: (canvasW - (GRID_W * CELL_SIZE * initialScale)) / 2, y: (screenH - (GRID_H * CELL_SIZE * initialScale)) / 2 });
      };

      useEffect(() => { centerGrid(); }, []);
      useEffect(() => {
        if (isLightMode) document.body.classList.add('light');
        else document.body.classList.remove('light');
      }, [isLightMode]);

      useEffect(() => { evaluateCircuit(cells); }, [cells]);

      const applyZoom = (newScale, centerX, centerY) => {
        const prevScale = scaleRef.current;
        const clampedScale = Math.min(Math.max(0.2, newScale), 3.5); 
        if (prevScale === clampedScale) return;
        const scaleRatio = clampedScale / prevScale;
        const currentOffset = offsetRef.current;
        const newX = centerX - (centerX - currentOffset.x) * scaleRatio;
        const newY = centerY - (centerY - currentOffset.y) * scaleRatio;
        setScale(clampedScale);
        setOffset({ x: newX, y: newY });
      };

      const handleZoomIn = () => { const rect = viewportRef.current.getBoundingClientRect(); applyZoom(scale * 1.3, rect.width / 2, rect.height / 2); };
      const handleZoomOut = () => { const rect = viewportRef.current.getBoundingClientRect(); applyZoom(scale / 1.3, rect.width / 2, rect.height / 2); };

      useEffect(() => {
        const viewport = viewportRef.current;
        if (!viewport) return;

        const handleWheel = (e) => {
          e.preventDefault(); 
          const zoomSensitivity = 0.002;
          const delta = -e.deltaY * zoomSensitivity;
          const newScale = scaleRef.current * (1 + delta);
          const rect = viewport.getBoundingClientRect();
          applyZoom(newScale, e.clientX - rect.left, e.clientY - rect.top);
        };

        let initialDist = 0, initialScaleAtTouch = 1;
        const handleTouchStart = (e) => {
          if (e.touches.length === 2) {
            e.preventDefault(); 
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            initialDist = Math.hypot(dx, dy);
            initialScaleAtTouch = scaleRef.current;
          }
        };

        const handleTouchMove = (e) => {
          if (e.touches.length === 2) {
            e.preventDefault();
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const dist = Math.hypot(dx, dy);
            const newScale = initialScaleAtTouch * (dist / initialDist);
            const rect = viewport.getBoundingClientRect();
            const centerX = ((e.touches[0].clientX + e.touches[1].clientX) / 2) - rect.left;
            const centerY = ((e.touches[0].clientY + e.touches[1].clientY) / 2) - rect.top;
            applyZoom(newScale, centerX, centerY);
          }
        };

        viewport.addEventListener('wheel', handleWheel, { passive: false });
        viewport.addEventListener('touchstart', handleTouchStart, { passive: false });
        viewport.addEventListener('touchmove', handleTouchMove, { passive: false });

        return () => {
          viewport.removeEventListener('wheel', handleWheel);
          viewport.removeEventListener('touchstart', handleTouchStart);
          viewport.removeEventListener('touchmove', handleTouchMove);
        };
      }, []);

      const evaluateCircuit = (grid) => {
        if (!grid || Object.keys(grid).length === 0) {
          setSimState({ shortCircuit: false, bulbPowers: {} });
          return;
        }

        const parent = {};
        const find = (i) => { if (parent[i] === undefined) parent[i] = i; if (parent[i] === i) return i; return parent[i] = find(parent[i]); };
        const union = (i, j) => { const rootI = find(i); const rootJ = find(j); if (rootI !== rootJ) parent[rootI] = rootJ; };
        const getNodeId = (x, y, dir) => `${x},${y},${dir}`;

        Object.entries(grid).forEach(([pos, cell]) => {
          const [xStr, yStr] = pos.split(',');
          const x = parseInt(xStr, 10), y = parseInt(yStr, 10);
          if (cell.type === 'wire') {
            for(let d = 0; d < 7; d++) union(getNodeId(x, y, d), getNodeId(x, y, d + 1));
          } else {
            getInternalConns(cell).forEach(([p1, p2]) => union(getNodeId(x, y, p1), getNodeId(x, y, p2)));
          }
        });

        for (let y = 0; y < GRID_H; y++) {
          for (let x = 0; x < GRID_W; x++) {
            const current = grid[`${x},${y}`];
            if (!current) continue;
            let neighbor = grid[`${x+1},${y}`];
            if (neighbor && hasPort(current, DIR_E) && hasPort(neighbor, DIR_W)) union(getNodeId(x, y, DIR_E), getNodeId(x + 1, y, DIR_W));
            neighbor = grid[`${x+1},${y+1}`];
            if (neighbor && hasPort(current, DIR_SE) && hasPort(neighbor, DIR_NW)) union(getNodeId(x, y, DIR_SE), getNodeId(x + 1, y + 1, DIR_NW));
            neighbor = grid[`${x},${y+1}`];
            if (neighbor && hasPort(current, DIR_S) && hasPort(neighbor, DIR_N)) union(getNodeId(x, y, DIR_S), getNodeId(x, y + 1, DIR_N));
            neighbor = grid[`${x-1},${y+1}`];
            if (neighbor && hasPort(current, DIR_SW) && hasPort(neighbor, DIR_NE)) union(getNodeId(x, y, DIR_SW), getNodeId(x - 1, y + 1, DIR_NE));
          }
        }

        let shortCircuit = false;
        const sources = [], bulbs = [];
        const activeRoots = new Set();

        Object.entries(grid).forEach(([pos, cell]) => {
          const [x, y] = pos.split(',').map(Number);
          if (cell.type === 'source') {
            const r1 = find(getNodeId(x, y, cell.rot));             
            const r2 = find(getNodeId(x, y, (cell.rot + 4) % 8));   
            if (r1 === r2) shortCircuit = true;                     
            activeRoots.add(r1); activeRoots.add(r2);
            sources.push({ r1, r2 });
          }
          if (cell.type === 'bulb') {
            const r1 = find(getNodeId(x, y, cell.rot));
            const r2 = find(getNodeId(x, y, (cell.rot + 4) % 8));
            activeRoots.add(r1); activeRoots.add(r2);
            bulbs.push({ key: pos, r1, r2 });
          }
        });

        if (shortCircuit) { setSimState({ shortCircuit: true, bulbPowers: {} }); return; }

        const netCount = activeRoots.size;
        if (netCount === 0) { setSimState({ shortCircuit: false, bulbPowers: {} }); return; }

        const netMap = new Map();
        let idx = 0;
        activeRoots.forEach(r => netMap.set(r, idx++));

        const G = Array(netCount).fill(0).map(() => Array(netCount).fill(0));
        const I = Array(netCount).fill(0);

        for (let i = 0; i < netCount; i++) G[i][i] += 1e-6; 
        G[0][0] += 1e6; 

        const G_bulb = 0.1;
        const G_bat = 2.0;
        const I_bat = 9.0;

        bulbs.forEach(b => {
          const n1 = netMap.get(b.r1), n2 = netMap.get(b.r2);
          if (n1 !== n2) {
            G[n1][n1] += G_bulb; G[n2][n2] += G_bulb;
            G[n1][n2] -= G_bulb; G[n2][n1] -= G_bulb;
          }
        });

        sources.forEach(s => {
          const n1 = netMap.get(s.r1), n2 = netMap.get(s.r2); 
          if (n1 !== n2) {
            G[n1][n1] += G_bat; G[n2][n2] += G_bat;
            G[n1][n2] -= G_bat; G[n2][n1] -= G_bat;
            I[n1] += I_bat; 
            I[n2] -= I_bat; 
          }
        });

        const V = solveLinearSystem(G, I);
        const bulbPowers = {};

        bulbs.forEach(b => {
          const n1 = netMap.get(b.r1), n2 = netMap.get(b.r2);
          if (n1 !== n2) {
            const vDrop = V[n1] - V[n2];
            bulbPowers[b.key] = (vDrop * vDrop) * G_bulb;
          } else {
            bulbPowers[b.key] = 0;
          }
        });

        setSimState({ shortCircuit: false, bulbPowers });
      };

      const handleViewportPointerDown = (e) => {
        if (!e.isPrimary || showLegal) return; 
        if (tool === 'pan') {
          isDraggingViewport.current = true;
          dragStartPos.current = { x: e.clientX - offset.x, y: e.clientY - offset.y };
          e.currentTarget.setPointerCapture(e.pointerId);
        }
      };

      const handleViewportPointerMove = (e) => {
        if (!e.isPrimary) return;
        if (isDraggingViewport.current && tool === 'pan') {
          setOffset({ x: e.clientX - dragStartPos.current.x, y: e.clientY - dragStartPos.current.y });
        }
      };

      const handleViewportPointerUp = (e) => {
        isDraggingViewport.current = false;
        if (e.currentTarget.hasPointerCapture(e.pointerId)) e.currentTarget.releasePointerCapture(e.pointerId);
        isDrawing.current = false;
      };

      const handleCellAction = (x, y) => {
        const key = `${x},${y}`;
        const cell = cells[key];
        if (tool === 'erase') {
          const newCells = { ...cells }; delete newCells[key]; setCells(newCells);
        } else if (tool === 'rotate') {
          if (cell && cell.type !== 'wire') setCells({ ...cells, [key]: { ...cell, rot: (cell.rot + 1) % 8 } });
        } else if (tool === 'select') {
          if (cell && ['switch', 'wechselschalter', 'kreuzschalter'].includes(cell.type)) {
            setCells({ ...cells, [key]: { ...cell, state: cell.state ? 0 : 1 } });
          }
        } else if (tool !== 'pan') {
          if (cell) return; 
          setCells({ ...cells, [key]: { type: tool, rot: 0, state: 0 } });
        }
      };

      const gridHasConnection = (nx, ny, expectedDir) => {
        const neighbor = cells[`${nx},${ny}`];
        return neighbor ? hasPort(neighbor, expectedDir) : false;
      };

      const renderCell = (x, y) => {
        const key = `${x},${y}`;
        const cell = cells[key];
        if (!cell) return null;

        const transform = `rotate(${cell.rot * 45} 20 20)`;
        const wireCol = "var(--wire-color)"; 
        const strokeCol = "var(--component-stroke)";
        const fillCol = "var(--component-fill)";
        const dangerCol = "var(--c-red)";
        const amberCol = "var(--c-amber)";
        const greenCol = "var(--c-green)";

        if (cell.type === 'wire') {
          const n = gridHasConnection(x, y - 1, DIR_S);
          const e = gridHasConnection(x + 1, y, DIR_W);
          const s = gridHasConnection(x, y + 1, DIR_N);
          const w = gridHasConnection(x - 1, y, DIR_E);

          return (
            <svg width="40" height="40" viewBox="0 0 40 40" className="absolute top-0 left-0 pointer-events-none component-svg">
              {(n || e || s || w) && <circle cx="20" cy="20" r="3.2" fill={wireCol} />}
              {!(n || e || s || w) && <circle cx="20" cy="20" r="3.5" fill={wireCol} />}
              {n && <line x1="20" y1="20" x2="20" y2="-1" className="wire-line" />}
              {e && <line x1="20" y1="20" x2="41" y2="20" className="wire-line" />}
              {s && <line x1="20" y1="20" x2="20" y2="41" className="wire-line" />}
              {w && <line x1="20" y1="20" x2="-1" y2="20" className="wire-line" />}
            </svg>
          );
        }

        const power = (cell.type === 'bulb' && simState.bulbPowers[key]) ? simState.bulbPowers[key] : 0;
        const L = Math.min(1, Math.max(0, Math.pow(power / 1.8, 0.5))); 
        const isPowered = L > 0.05; 
        const openSwitch = cell.type === 'switch' && !cell.state;

        return (
          <svg width="40" height="40" viewBox="-12 -12 64 64" className="absolute pointer-events-none component-svg" style={{ top: '-12px', left: '-12px' }}>
            <g transform={`translate(12, 12) ${transform}`}>
              {cell.type === 'source' && (
                <g>
                  <line x1="20" y1="0" x2="20" y2="11" className="wire-line" />
                  <line x1="20" y1="40" x2="20" y2="29" className="wire-line" />
                  <rect x="5" y="9" width="30" height="22" rx="7" className="component-backplate" />
                  <line x1="10" y1="14" x2="30" y2="14" stroke={dangerCol} strokeWidth="3.4" strokeLinecap="round" /> 
                  <line x1="14" y1="26" x2="26" y2="26" stroke={strokeCol} strokeWidth="4.8" strokeLinecap="round" /> 
                  <text x="32" y="13" fontSize="8" fill={dangerCol} fontWeight="900">+</text>
                  <text x="31" y="29" fontSize="9" fill={strokeCol} fontWeight="900">−</text>
                </g>
              )}

              {cell.type === 'bulb' && (
                <g>
                  <line x1="20" y1="0" x2="20" y2="8" className="wire-line" />
                  <line x1="20" y1="40" x2="20" y2="32" className="wire-line" />
                  {isPowered && (
                    <g>
                      <circle cx="20" cy="20" r={18 + L * 9} fill={`rgba(253, 224, 71, ${L * 0.13})`} />
                      <circle cx="20" cy="20" r={14 + L * 5} fill={`rgba(253, 224, 71, ${L * 0.25})`} />
                    </g>
                  )}
                  <circle cx="20" cy="20" r="15" fill={fillCol} stroke={isPowered ? amberCol : strokeCol} strokeWidth="2.2" />
                  <circle cx="20" cy="20" r="10.5" fill={isPowered ? `rgba(253, 224, 71, ${0.18 + L * 0.45})` : "transparent"} stroke={isPowered ? amberCol : strokeCol} strokeWidth="1.6" />
                  <line x1="13.5" y1="13.5" x2="26.5" y2="26.5" stroke={isPowered ? `rgba(255,255,255,${0.55 + L * 0.45})` : strokeCol} strokeWidth="2.1" strokeLinecap="round" />
                  <line x1="13.5" y1="26.5" x2="26.5" y2="13.5" stroke={isPowered ? `rgba(255,255,255,${0.55 + L * 0.45})` : strokeCol} strokeWidth="2.1" strokeLinecap="round" />
                  <circle cx="20" cy="8" r="3.2" className="component-dot" />
                  <circle cx="20" cy="32" r="3.2" className="component-dot" />
                  {isPowered && (
                    <g transform={`rotate(-${cell.rot * 45} 20 20)`}>
                      <text x="20" y="48" fontSize="8" fill="var(--text-main)" textAnchor="middle" fontWeight="900" style={{ textShadow: '0 1px 4px rgba(0,0,0,0.9)' }}>
                        {power.toFixed(1)} W
                      </text>
                    </g>
                  )}
                </g>
              )}

              {cell.type === 'switch' && (
                <g>
                  <line x1="20" y1="0" x2="20" y2="10" className="wire-line" />
                  <line x1="20" y1="40" x2="20" y2="30" className="wire-line" />
                  <rect x="7" y="8" width="26" height="24" rx="7" className="component-backplate" />
                  <circle cx="20" cy="12" r="3.3" className="component-dot" />
                  <circle cx="20" cy="28" r="3.3" className="component-dot" />
                  {cell.state ? 
                    <line x1="20" y1="12" x2="20" y2="28" stroke={greenCol} strokeWidth="4" strokeLinecap="round" /> : 
                    <React.Fragment>
                      <line x1="20" y1="28" x2="30" y2="16" stroke={wireCol} strokeWidth="4" strokeLinecap="round" />
                      <path d="M10 20 L14 20 M26 20 L30 20" stroke={dangerCol} strokeWidth="2.4" strokeLinecap="round" opacity="0.95" />
                    </React.Fragment>
                  }
                </g>
              )}

              {cell.type === 'wechselschalter' && (
                <g>
                  <line x1="20" y1="0" x2="20" y2="10" className="wire-line" />
                  <line x1="20" y1="40" x2="20" y2="30" className="wire-line" />
                  <line x1="40" y1="20" x2="30" y2="20" className="wire-line" />
                  <rect x="6" y="7" width="28" height="26" rx="7" className="component-backplate" />
                  <circle cx="20" cy="12" r="3.2" className="component-dot" />
                  <circle cx="20" cy="28" r="3.2" className="component-dot" />
                  <circle cx="30" cy="20" r="3.2" className="component-dot" />
                  {cell.state === 0 ? 
                    <line x1="20" y1="12" x2="20" y2="28" stroke={wireCol} strokeWidth="4" strokeLinecap="round" /> : 
                    <line x1="20" y1="12" x2="30" y2="20" stroke={wireCol} strokeWidth="4" strokeLinecap="round" />
                  }
                </g>
              )}

              {cell.type === 'kreuzschalter' && (
                <g>
                  <line x1="20" y1="0" x2="20" y2="9" className="wire-line" />
                  <line x1="40" y1="20" x2="31" y2="20" className="wire-line" />
                  <line x1="20" y1="40" x2="20" y2="31" className="wire-line" />
                  <line x1="0" y1="20" x2="9" y2="20" className="wire-line" />
                  <rect x="8" y="8" width="24" height="24" rx="6" className="component-backplate" />
                  <circle cx="20" cy="10" r="3" className="component-dot" />
                  <circle cx="30" cy="20" r="3" className="component-dot" />
                  <circle cx="20" cy="30" r="3" className="component-dot" />
                  <circle cx="10" cy="20" r="3" className="component-dot" />
                  {cell.state === 0 ? (
                    <React.Fragment>
                      <line x1="20" y1="10" x2="20" y2="30" stroke={wireCol} strokeWidth="3.8" strokeLinecap="round" />
                      <line x1="10" y1="20" x2="30" y2="20" stroke={wireCol} strokeWidth="3.8" strokeLinecap="round" />
                    </React.Fragment>
                  ) : (
                    <React.Fragment>
                      <line x1="20" y1="10" x2="30" y2="20" stroke={wireCol} strokeWidth="3.8" strokeLinecap="round" />
                      <line x1="10" y1="20" x2="20" y2="30" stroke={wireCol} strokeWidth="3.8" strokeLinecap="round" />
                    </React.Fragment>
                  )}
                </g>
              )}
            </g>
          </svg>
        );
      };

      const ToolBtn = ({ name, iconName, label }) => (
        <button onClick={() => setTool(name)} className={`tool-btn ${tool === name ? 'active' : ''}`}>
          <Icon name={iconName} className={tool === name ? "text-[var(--accent)]" : "text-[var(--text-muted)]"} />
          <span>{label}</span>
        </button>
      );

      return (
        <div className="app-container">
          <aside className="sidebar flex flex-col h-full">
            <div className="sidebar-header">
              <div className="school-name">Gymnasium Thomaeum</div>
              <div className="course-title">HQ-Matrix</div>
              <p className="text-xs text-[var(--text-muted)] mt-1 font-medium">Energiefluss-Kontrolle</p>
            </div>

            <div className="sidebar-content scrollbar-hide flex-1">
              <div className="nav-label">Aktionen</div>
              <div className="tool-grid">
                <ToolBtn name="pan" label="Navigieren" iconName="move" />
                <ToolBtn name="select" label="Bedienen" iconName="mouse-pointer-2" />
                <ToolBtn name="rotate" label="Rotieren" iconName="rotate-cw" />
                <ToolBtn name="erase" label="Demontage" iconName="eraser" />
              </div>

              <div className="nav-label mt-2">Bauelemente</div>
              <div className="tool-grid pb-4">
                <ToolBtn name="wire" label="Kabel" iconName="cable" />
                <ToolBtn name="source" label="Batterie" iconName="battery" />
                <ToolBtn name="bulb" label="Lampe" iconName="lightbulb" />
                <ToolBtn name="switch" label="Schalter" iconName="toggle-left" />
                <ToolBtn name="wechselschalter" label="Wechsler" iconName="git-branch" />
                <ToolBtn name="kreuzschalter" label="Kreuz" iconName="git-merge" />
              </div>
            </div>

            <div className="px-6 pb-6 pt-2 shrink-0 bg-[var(--sidebar-bg)] border-t border-[var(--glass-border)] md:border-none">
              <button onClick={() => setCells({})} className="danger-btn mb-4">
                <Icon name="trash-2" size={16} /> Sektor bereinigen
              </button>

              <div className="flex items-center justify-center gap-4 text-[10px] uppercase tracking-wider text-[var(--text-muted)] font-semibold">
                <button onClick={() => setShowLegal(true)} className="hover:text-[var(--text-main)] transition-colors">Impressum</button>
                <span>&bull;</span>
                <button onClick={() => setShowLegal(true)} className="hover:text-[var(--text-main)] transition-colors">Datenschutz</button>
              </div>
            </div>
          </aside>

          <main className="main-area relative">
            <header className="glass-header">
              <div className="flex items-center gap-3 text-[var(--accent)] font-semibold tracking-wide uppercase text-sm">
                <Icon name="cpu" />
                <span>Laborbereich</span>
              </div>
              <button 
                onClick={() => setIsLightMode(!isLightMode)}
                className="p-2 rounded-xl text-[var(--text-dim)] hover:text-[var(--text-main)] hover:bg-[var(--glass-border)] transition-colors"
                title="Erscheinungsbild anpassen"
              >
                <Icon name={isLightMode ? "moon" : "sun"} />
              </button>
            </header>

            <div 
              ref={viewportRef}
              className={`canvas-container ${tool === 'pan' ? 'cursor-move' : 'cursor-crosshair'}`}
              onPointerDown={handleViewportPointerDown}
              onPointerMove={handleViewportPointerMove}
              onPointerUp={handleViewportPointerUp}
              onPointerLeave={handleViewportPointerUp}
            >
              <div className="zoom-controls">
                <button onClick={handleZoomIn} className="zoom-btn" title="Vergrößern"><Icon name="zoom-in" size={20} /></button>
                <button onClick={centerGrid} className="zoom-btn" title="Zentrieren"><Icon name="focus" size={20} /></button>
                <button onClick={handleZoomOut} className="zoom-btn" title="Verkleinern"><Icon name="zoom-out" size={20} /></button>
              </div>

              {simState.shortCircuit && (
                <div className="absolute top-6 left-1/2 -translate-x-1/2 z-30 bg-[var(--c-red)] text-white px-6 py-3 rounded-xl font-bold shadow-[0_0_30px_rgba(248,113,113,0.5)] animate-pulse flex items-center gap-3 text-sm uppercase tracking-widest pointer-events-none">
                  <Icon name="alert-triangle" /> Kritischer Kurzschluss
                </div>
              )}

              <div 
                className="absolute transition-transform duration-75 ease-out"
                style={{ 
                  width: GRID_W * CELL_SIZE, 
                  height: GRID_H * CELL_SIZE,
                  transform: `translate(${offset.x}px, ${offset.y}px) scale(${scale})`, 
                  transformOrigin: '0 0',
                  willChange: 'transform'
                }}
              >
                <div 
                  className="absolute inset-0 pointer-events-none opacity-60"
                  style={{ 
                    backgroundImage: 'radial-gradient(var(--grid-line) 2px, transparent 2px)',
                    backgroundSize: '40px 40px', backgroundPosition: '19px 19px'
                  }}
                />

                <div className="relative w-full h-full grid" style={{ gridTemplateColumns: `repeat(${GRID_W}, 40px)`, gridTemplateRows: `repeat(${GRID_H}, 40px)` }}>
                  {Array.from({ length: GRID_W * GRID_H }).map((_, i) => {
                    const x = i % GRID_W, y = Math.floor(i / GRID_W);
                    return (
                      <div 
                        key={`${x}-${y}`}
                        className="w-[40px] h-[40px] relative border-[0.5px] border-[var(--grid-line)] hover:bg-[var(--theme-blue)]/10 transition-colors"
                        onPointerDown={(e) => {
                          if (!e.isPrimary || tool === 'pan' || showLegal) return;
                          isDrawing.current = true;
                          e.target.releasePointerCapture(e.pointerId);
                          handleCellAction(x, y);
                        }}
                        onPointerEnter={(e) => {
                          if (!e.isPrimary || tool === 'pan' || showLegal) return;
                          if (isDrawing.current && (tool === 'wire' || tool === 'erase')) handleCellAction(x, y);
                        }}
                      >
                        {renderCell(x, y)}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {showLegal && (
              <div className="absolute inset-0 z-[2000] flex items-center justify-center p-4 sm:p-8 bg-[#020617]/80 backdrop-blur-sm animate-[fadeIn_0.3s_ease-out]">
                <div className="relative w-full max-w-4xl max-h-full overflow-y-auto bg-[var(--glass-bg)] backdrop-blur-xl border border-[var(--glass-border)] rounded-2xl shadow-2xl p-6 sm:p-10 text-[var(--text-main)]">
                  <div className="flex items-center justify-between mb-8 border-b border-[var(--glass-border)] pb-4">
                    <h2 className="text-2xl font-bold font-display text-[var(--accent)] tracking-wide">Rechtliches</h2>
                    <button onClick={() => setShowLegal(false)} className="p-2 bg-[var(--glass-border)] hover:bg-[var(--accent-soft)] hover:text-[var(--accent)] rounded-lg transition-colors">
                      <Icon name="x" size={24} />
                    </button>
                  </div>
                  <div className="grid md:grid-cols-2 gap-8 md:gap-12">
                    <div className="space-y-4">
                      <h3 className="text-xl font-semibold font-display text-white">Impressum</h3>
                      <div className="text-sm text-[var(--text-dim)] leading-relaxed space-y-4">
                        <p><strong className="text-[var(--text-main)]">Angaben gemäß § 5 TMG</strong><br/>Dr. Claus Unterberg<br/>Gymnasium Thomaeum<br/>Am Gymnasium 4<br/>47906 Kempen</p>
                        <p><strong className="text-[var(--text-main)]">Kontakt</strong><br/>E-Mail: <a href="mailto:claus.unterberg@thomaeum.de" className="text-[var(--accent)] hover:underline">claus.unterberg@thomaeum.de</a></p>
                        <p><strong className="text-[var(--text-main)]">Hinweis</strong><br/>Diese Webseite ist ein privates, nicht-kommerzielles Angebot zur Unterstützung von Lehrkräften im Umgang mit KI-Werkzeugen. Sie steht in keinem offiziellen Zusammenhang mit dem Gymnasium Thomaeum oder dem Land Nordrhein-Westfalen.</p>
                      </div>
                    </div>
                    <div className="space-y-4">
                      <h3 className="text-xl font-semibold font-display text-white">Datenschutzerklärung</h3>
                      <div className="text-sm text-[var(--text-dim)] leading-relaxed space-y-4">
                        <p><strong className="text-[var(--text-main)]">Verantwortlicher</strong><br/>Dr. Claus Unterberg (siehe Impressum)</p>
                        <p><strong className="text-[var(--text-main)]">Hosting</strong><br/>Diese Seite wird über GitHub Pages gehostet. GitHub kann beim Aufruf technische Daten verarbeiten. Weitere Infos: <a href="https://docs.github.com/en/site-policy/privacy-policies/github-general-privacy-statement" target="_blank" rel="noopener noreferrer" className="text-[var(--accent)] hover:underline">GitHub Privacy Statement</a>.</p>
                        <p><strong className="text-[var(--text-main)]">Keine Cookies, kein Tracking</strong><br/>Diese Seite setzt selbst keine Cookies und verwendet keine Analyse-Tools. Da das Projekt rein lokal im Browser läuft, werden keine Schaltungs-Daten der Matrix an externe Server übermittelt.</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
