<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wechselstrom-Labor · RLC, Filter, Oszilloskop und Klang</title>
<style>
@font-face{font-family:Inter;src:url('Fonts/inter-v20-latin-regular.woff2') format('woff2');font-weight:400;font-display:swap}
@font-face{font-family:Inter;src:url('Fonts/inter-v20-latin-600.woff2') format('woff2');font-weight:600;font-display:swap}
@font-face{font-family:Poppins;src:url('Fonts/poppins-v24-latin-700.woff2') format('woff2');font-weight:700;font-display:swap}
:root{
  --bg:#06101f;--bg2:#101a3a;--panel:rgba(15,23,42,.80);--panel2:rgba(2,6,23,.90);
  --border:rgba(255,255,255,.12);--text:#f8fafc;--muted:#94a3b8;--dim:#cbd5e1;
  --accent:#38bdf8;--green:#34d399;--amber:#fbbf24;--red:#fb7185;--violet:#a78bfa;--pink:#f472b6;
  --wire:#dbeafe;--grid:rgba(255,255,255,.065);--fill:rgba(2,6,23,.75);
  --shadow:0 18px 55px rgba(0,0,0,.45);--side:360px;
}
body.light{
  --bg:#f8fafc;--bg2:#dbeafe;--panel:rgba(255,255,255,.88);--panel2:rgba(255,255,255,.96);
  --border:rgba(15,23,42,.13);--text:#0f172a;--muted:#64748b;--dim:#334155;
  --accent:#0369a1;--green:#047857;--amber:#b45309;--red:#be123c;--violet:#6d28d9;--pink:#be185d;
  --wire:#1e293b;--grid:rgba(15,23,42,.09);--fill:rgba(255,255,255,.78);
  --shadow:0 14px 40px rgba(15,23,42,.14);
}
*{box-sizing:border-box}
html,body,#app{width:100%;height:100%;margin:0;overflow:hidden}
body{
  font-family:Inter,system-ui,sans-serif;color:var(--text);
  background:radial-gradient(circle at 12% 8%,rgba(56,189,248,.20),transparent 32%),
             radial-gradient(circle at 85% 80%,rgba(167,139,250,.20),transparent 36%),
             linear-gradient(135deg,var(--bg),var(--bg2));
}
button,input,select{font-family:inherit}
.app{height:100%;display:flex}
.sidebar{
  width:var(--side);height:100%;background:var(--panel2);backdrop-filter:blur(24px);
  border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:5
}
.brand{padding:28px 24px 18px;border-bottom:1px solid var(--border)}
.kicker{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:800}
h1{font-family:Poppins,Inter,sans-serif;font-size:28px;line-height:1.05;margin:8px 0 4px;letter-spacing:-.03em}
.brand p{margin:0;color:var(--muted);font-size:13px}
.side-scroll{overflow:auto;padding:18px 18px 26px}
.section-title{margin:18px 4px 9px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:800}
.tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tool{
  border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--dim);
  border-radius:14px;padding:10px;display:flex;gap:8px;align-items:center;cursor:pointer;
  font-size:13px;font-weight:700;min-height:42px;transition:.18s
}
.tool:hover{transform:translateY(-1px);background:rgba(255,255,255,.07)}
.tool.active{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 14%, transparent)}
.tool svg{width:18px;height:18px;flex:0 0 auto}
.panel{margin-top:12px;border:1px solid var(--border);border-radius:18px;background:var(--panel);padding:14px;box-shadow:var(--shadow)}
.row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin:9px 0}
.row label{font-size:12px;color:var(--dim);font-weight:700}
.row input,.row select{
  width:150px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);
  border-radius:10px;padding:7px 9px;outline:none
}
.row select option{background:#0f172a;color:white}
body.light .row select option{background:white;color:#0f172a}
.checks{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
.check{
  display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:10px;
  padding:7px 8px;font-size:12px;color:var(--dim);cursor:pointer
}
.check input{width:auto}
.small{font-size:12px;color:var(--muted);line-height:1.45}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}
.btn{
  border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--dim);
  border-radius:12px;padding:10px;font-weight:800;cursor:pointer
}
.btn:hover{background:color-mix(in srgb,var(--accent) 12%, transparent);color:var(--accent)}
.btn.red:hover{background:color-mix(in srgb,var(--red) 16%, transparent);color:var(--red)}
.main{flex:1;min-width:0;height:100%;display:flex;flex-direction:column;position:relative}
.topbar{
  height:66px;display:flex;justify-content:space-between;align-items:center;padding:0 22px;
  background:var(--panel);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:3
}
.topbar strong{font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:var(--accent)}
.top-actions{display:flex;gap:8px;align-items:center}
.canvas-wrap{flex:1;position:relative;overflow:hidden;touch-action:none}
.grid{
  position:absolute;transform-origin:0 0;width:1680px;height:1240px;
  background-image:radial-gradient(var(--grid) 2px,transparent 2px);background-size:40px 40px;background-position:19px 19px
}
.cell{position:absolute;width:40px;height:40px;border:.5px solid var(--grid)}
.cell:hover{background:color-mix(in srgb,var(--accent) 11%, transparent)}
.comp{position:absolute;width:40px;height:40px;overflow:visible;pointer-events:none}
.wire{stroke:var(--wire);stroke-width:3.4;stroke-linecap:round}
.sym{stroke:var(--wire);stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round;fill:none}
.fill{fill:var(--fill);stroke:var(--wire);stroke-width:2.3}
.term{fill:var(--wire);stroke:var(--bg);stroke-width:1}
.selected-cell{outline:2px solid var(--accent);outline-offset:-2px;background:color-mix(in srgb,var(--accent) 11%, transparent)}
.hud{
  position:absolute;left:20px;bottom:20px;z-index:4;width:min(720px,calc(100% - 40px));
  background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:14px;box-shadow:var(--shadow);backdrop-filter:blur(20px)
}
.hud-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
.hud-title{font-weight:900;color:var(--accent)}
.scope{width:100%;height:180px;border-radius:14px;background:rgba(2,6,23,.55);border:1px solid var(--border)}
body.light .scope{background:rgba(255,255,255,.55)}
.float{position:absolute;right:20px;bottom:20px;z-index:4;display:flex;flex-direction:column;gap:8px}
.float .btn{background:var(--panel);box-shadow:var(--shadow);width:44px;height:44px;padding:0}
.badge{
  display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border);background:rgba(255,255,255,.05);
  padding:7px 10px;border-radius:999px;color:var(--dim);font-size:12px;font-weight:800
}
.warning{
  position:absolute;left:50%;top:86px;transform:translateX(-50%);z-index:10;
  color:white;background:var(--red);padding:10px 18px;border-radius:14px;font-weight:900;box-shadow:0 0 35px rgba(251,113,133,.45)
}
.modal{
  position:absolute;inset:0;z-index:20;background:rgba(2,6,23,.78);display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(8px)
}
.modal-card{max-width:980px;max-height:90vh;overflow:auto;background:var(--panel2);border:1px solid var(--border);border-radius:22px;padding:26px;box-shadow:var(--shadow)}
.modal-card h2{font-family:Poppins;margin:0 0 14px;color:var(--accent)}
.freq-canvas{width:100%;height:310px;background:rgba(2,6,23,.55);border:1px solid var(--border);border-radius:16px}
.help-list{padding-left:18px;color:var(--dim);line-height:1.5}
@media(max-width:860px){
  .app{flex-direction:column}.sidebar{width:100%;height:45%;border-right:0;border-bottom:1px solid var(--border)}
  .brand{display:none}.tool-grid{grid-template-columns:repeat(3,1fr)}.tool{font-size:11px;padding:8px;min-height:38px}
  .topbar{height:56px;padding:0 12px}.hud{left:10px;bottom:10px;width:calc(100% - 20px)}.float{right:12px;bottom:212px}
}
</style>

<body>
<div id="app"></div>
<script>
(() => {
const GRID_W=42, GRID_H=31, CELL=40;
const DIR_N=0, DIR_E=2, DIR_S=4, DIR_W=6;
const dirs=[DIR_N,DIR_E,DIR_S,DIR_W], colors=["#38bdf8","#fbbf24","#34d399","#f472b6","#a78bfa"];
const opp=d=>(d+4)%8;
const state={
  cells:{}, selected:null, tool:"select", scale:0.9, offset:{x:80,y:70}, dragging:false, dragStart:null,
  drawing:false, light:false, showHelp:false, showFreq:false, audio:null, audioOn:false,
  visibleScopes:[], audibleSpeaker:null,
  sim:{ok:true,msg:"",values:{},scopes:[],speakers:[],source:null,totalCurrent:0,nodes:0}
};
const app=document.getElementById("app");
const icons={
pan:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 9l-3 3 3 3"/><path d="M9 5l3-3 3 3"/><path d="M15 19l-3 3-3-3"/><path d="M19 9l3 3-3 3"/><path d="M2 12h20"/><path d="M12 2v20"/></svg>',
wire:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 12h16"/><path d="M7 9v6"/><path d="M17 9v6"/></svg>',
source:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="7"/><path d="M6 12c2-5 4 5 6 0s4 5 6 0"/></svg>',
dcsource:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3v5"/><path d="M12 16v5"/><path d="M7 8h10"/><path d="M9 16h6"/><path d="M5 5l14 14"/></svg>',
threeway:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 12h5"/><path d="M15 6h5"/><path d="M15 18h5"/><path d="M9 12l6-6"/><circle cx="9" cy="12" r="1.5"/></svg>',
resistor:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12h4l2-4 4 8 4-8 2 4h2"/></svg>',
inductor:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12h3"/><path d="M6 12a3 3 0 0 1 6 0"/><path d="M12 12a3 3 0 0 1 6 0"/><path d="M18 12h3"/></svg>',
capacitor:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 12h6"/><path d="M14 12h6"/><path d="M10 6v12"/><path d="M14 6v12"/></svg>',
ammeter:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="8"/><path d="M9 15l3-7 3 7"/><path d="M10.2 13h3.6"/></svg>',
scope:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M6 12h3l2-4 3 8 2-4h2"/></svg>',
speaker:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 9v6h4l5 4V5L9 9H5z"/><path d="M17 9a4 4 0 0 1 0 6"/></svg>',
switch:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 17h5"/><path d="M15 17h5"/><path d="M9 17l6-8"/></svg>',
erase:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M7 21h10"/><path d="M4 15l8-8 6 6-8 8H6l-2-2z"/></svg>',
rotate:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>',
select:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 3l7 17 2-7 7-2z"/></svg>',
sun:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>',
moon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>'
};
const complex=(re=0,im=0)=>({re,im});
const cadd=(a,b)=>({re:a.re+b.re,im:a.im+b.im});
const csub=(a,b)=>({re:a.re-b.re,im:a.im-b.im});
const cmul=(a,b)=>({re:a.re*b.re-a.im*b.im,im:a.re*b.im+a.im*b.re});
const cdiv=(a,b)=>{const d=b.re*b.re+b.im*b.im||1e-30;return{re:(a.re*b.re+a.im*b.im)/d,im:(a.im*b.re-a.re*b.im)/d}};
const cabs=a=>Math.hypot(a.re,a.im);

function defaultCell(type){
  const base={type,rot:DIR_E,state:1,id:Math.random().toString(36).slice(2,7),label:""};
  if(type==="source") return {...base,U:5,f:1000,mode:"sine"};
  if(type==="dcsource") return {...base,U:5,charged:false};
  if(type==="threeway") return {...base,state:0};
  if(type==="resistor") return {...base,R:1000};
  if(type==="inductor") return {...base,L:0.1};
  if(type==="capacitor") return {...base,C:1e-6};
  if(type==="ammeter") return {...base,R:0.05};
  if(type==="scope") return {...base,R:1000000,channel:1};
  if(type==="speaker") return {...base,R:8,name:""};
  return base;
}
function key(x,y){return x+","+y}
function xy(k){return k.split(",").map(Number)}
function ports(c){if(!c)return[]; if(c.type==="wire")return dirs; return [c.rot,opp(c.rot)]}
function hasPort(c,d){return ports(c).includes(d)}
function branchType(t){return ["source","dcsource","resistor","inductor","capacitor","ammeter","scope","speaker","switch","threeway"].includes(t)}
function fmt(v,unit){
  const a=Math.abs(v);
  if(!isFinite(a))return "∞";
  if(a>=1000)return (v/1000).toFixed(2)+" k"+unit;
  if(a>=1)return v.toFixed(2)+" "+unit;
  if(a>=1e-3)return (v*1000).toFixed(2)+" m"+unit;
  if(a>=1e-6)return (v*1e6).toFixed(2)+" µ"+unit;
  if(a>=1e-9)return (v*1e9).toFixed(2)+" n"+unit;
  return "0 "+unit;
}
function admittance(c,f){
  if(c.type==="resistor") return complex(1/Math.max(c.R,1e-9),0);
  if(c.type==="ammeter") return complex(1/Math.max(c.R||0.05,1e-9),0);
  if(c.type==="scope") return complex(1/Math.max(c.R||1e6,1e-9),0);
  if(c.type==="speaker") return complex(1/Math.max(c.R||8,1e-9),0);
  if(c.type==="switch") return c.state?complex(1e6,0):complex(1e-10,0);
  if(c.type==="threeway") return c.state?complex(1e6,0):complex(1e-10,0);
  if(c.type==="inductor"){const X=2*Math.PI*f*Math.max(c.L,1e-12);return cdiv(complex(1,0),complex(0,X))}
  if(c.type==="capacitor"){const C=Math.max(c.C,1e-15);return complex(0,2*Math.PI*f*C)}
  return complex(0,0);
}
function solveComplex(A,b){
  const n=A.length;
  for(let i=0;i<n;i++){
    let best=i,bv=cabs(A[i][i]);
    for(let r=i+1;r<n;r++){const v=cabs(A[r][i]);if(v>bv){best=r;bv=v}}
    if(best!==i){[A[i],A[best]]=[A[best],A[i]];[b[i],b[best]]=[b[best],b[i]]}
    if(cabs(A[i][i])<1e-18)continue;
    for(let r=i+1;r<n;r++){
      const fac=cdiv(A[r][i],A[i][i]);
      for(let col=i;col<n;col++)A[r][col]=csub(A[r][col],cmul(fac,A[i][col]));
      b[r]=csub(b[r],cmul(fac,b[i]));
    }
  }
  const x=Array(n).fill(0).map(()=>complex(0,0));
  for(let i=n-1;i>=0;i--){
    let sum=b[i];
    for(let j=i+1;j<n;j++)sum=csub(sum,cmul(A[i][j],x[j]));
    x[i]=cabs(A[i][i])<1e-18?complex(0,0):cdiv(sum,A[i][i]);
  }
  return x;
}
function evaluateAt(freqOverride=null){
  const grid=state.cells,parent={};
  const find=a=>{if(parent[a]===undefined)parent[a]=a;return parent[a]===a?a:parent[a]=find(parent[a])}
  const union=(a,b)=>{const ra=find(a),rb=find(b);if(ra!==rb)parent[ra]=rb}
  const node=(x,y,d)=>`${x},${y},${d}`;
  Object.entries(grid).forEach(([k0,c])=>{
    const [x,y]=xy(k0);
    if(c.type==="wire")dirs.forEach(d=>union(node(x,y,d),node(x,y,DIR_N)));
  });
  Object.entries(grid).forEach(([k0,c])=>{
    const [x,y]=xy(k0);
    [[x+1,y,DIR_E,DIR_W],[x,y+1,DIR_S,DIR_N]].forEach(([nx,ny,d,od])=>{
      const n=grid[key(nx,ny)];
      if(n&&hasPort(c,d)&&hasPort(n,od))union(node(x,y,d),node(nx,ny,od));
    });
  });
  const branches=[],sources=[],active=new Set();
  Object.entries(grid).forEach(([k0,c])=>{
    if(!branchType(c.type))return;
    const [x,y]=xy(k0), a=find(node(x,y,c.rot)), b=find(node(x,y,opp(c.rot)));
    active.add(a);active.add(b);
    if(c.type==="source"||c.type==="dcsource")sources.push({key:k0,c,a,b}); else branches.push({key:k0,c,a,b});
  });
  const acSource=sources.find(s=>s.c.type==="source");
  const source=acSource||sources[0], f=freqOverride ?? (acSource?acSource.c.f:1);
  if(!source)return {ok:true,msg:"Keine Quelle",values:{},source:null,totalCurrent:0,nodes:0,scopes:[],speakers:[],f};
  if(source.a===source.b)return {ok:false,msg:"Kurzschluss an der Spannungsquelle",values:{},source,totalCurrent:Infinity,nodes:0,scopes:[],speakers:[],f};
  const roots=[...active], ground=source.b, nodeMap=new Map(); let nidx=0;
  roots.forEach(r=>{if(r!==ground)nodeMap.set(r,nidx++)});
  const m=sources.length,N=nidx+m;
  const A=Array(N).fill(0).map(()=>Array(N).fill(0).map(()=>complex(0,0)));
  const z=Array(N).fill(0).map(()=>complex(0,0));
  const stampY=(ra,rb,Y)=>{
    const ia=nodeMap.get(ra),ib=nodeMap.get(rb);
    if(ia!==undefined)A[ia][ia]=cadd(A[ia][ia],Y);
    if(ib!==undefined)A[ib][ib]=cadd(A[ib][ib],Y);
    if(ia!==undefined&&ib!==undefined){A[ia][ib]=csub(A[ia][ib],Y);A[ib][ia]=csub(A[ib][ia],Y)}
  };
  branches.forEach(br=>stampY(br.a,br.b,admittance(br.c,f)));
  sources.forEach((s,si)=>{
    const row=nidx+si,col=nidx+si,ia=nodeMap.get(s.a),ib=nodeMap.get(s.b);
    if(ia!==undefined){A[ia][col]=cadd(A[ia][col],complex(1,0));A[row][ia]=cadd(A[row][ia],complex(1,0))}
    if(ib!==undefined){A[ib][col]=csub(A[ib][col],complex(1,0));A[row][ib]=csub(A[row][ib],complex(1,0))}
    z[row]=complex(s.c.U||5,0);
  });
  for(let i=0;i<nidx;i++)A[i][i]=cadd(A[i][i],complex(1e-12,0));
  const sol=solveComplex(A,z), Vroot=r=>r===ground?complex(0,0):sol[nodeMap.get(r)]||complex(0,0);
  const values={}, scopes=[], speakers=[];
  branches.forEach(br=>{
    const v=csub(Vroot(br.a),Vroot(br.b)), I=cmul(v,admittance(br.c,f));
    values[br.key]={V:cabs(v),I:cabs(I),phaseV:Math.atan2(v.im,v.re),phaseI:Math.atan2(I.im,I.re),complexV:v,complexI:I};
    if(br.c.type==="scope")scopes.push({key:br.key,c:br.c,V:cabs(v),phase:Math.atan2(v.im,v.re),f,channel:br.c.channel||1});
    if(br.c.type==="speaker")speakers.push({key:br.key,c:br.c,V:cabs(v),phase:Math.atan2(v.im,v.re),f});
  });
  sources.forEach((s,si)=>{
    const I=sol[nidx+si]||complex(0,0);
    values[s.key]={V:s.c.U||5,I:cabs(I),phaseI:Math.atan2(I.im,I.re),complexI:I};
  });
  return {ok:true,msg:"",values,source,totalCurrent:cabs(sol[nidx]||complex(0,0)),nodes:nidx,scopes,speakers,f};
}
function evaluate(){
  state.sim=evaluateAt();
  const keys=state.sim.scopes.map(s=>s.key);
  state.visibleScopes=state.visibleScopes.filter(k=>keys.includes(k));
  if(state.visibleScopes.length===0&&keys.length>0)state.visibleScopes=[...keys];
  const sp=state.sim.speakers.map(s=>s.key);
  if(state.audibleSpeaker&&!sp.includes(state.audibleSpeaker))state.audibleSpeaker=null;
  if(!state.audibleSpeaker&&sp.length>0)state.audibleSpeaker=sp[0];
}

function getLCTransient(){
  const cells=Object.values(state.cells);
  const dc=cells.find(c=>c.type==="dcsource");
  const sw=cells.find(c=>c.type==="threeway");
  const L=cells.find(c=>c.type==="inductor");
  const C=cells.find(c=>c.type==="capacitor");
  if(!dc||!sw||!L||!C) return null;

  const l=Math.max(L.L||1,1e-9);
  const cap=Math.max(C.C||0.1,1e-12);
  const U=dc.U||5;

  // Vereinfachtes Serien-RLC-Modell für die freie Schwingung.
  // Es werden alle ohmschen Widerstände im Aufbau als Dämpfungswiderstände aufsummiert.
  // Das Amperemeter erhält zusätzlich seinen kleinen Innenwiderstand.
  const explicitR=cells
    .filter(c=>c.type==="resistor")
    .reduce((s,c)=>s+Math.max(c.R||0,0),0);
  const ammeterR=cells
    .filter(c=>c.type==="ammeter")
    .reduce((s,c)=>s+Math.max(c.R||0.05,0),0);
  const R=explicitR+ammeterR;

  const omega0=1/Math.sqrt(l*cap);
  const alpha=R/(2*l);
  const underdamped=alpha<omega0;
  const omegaD=underdamped?Math.sqrt(omega0*omega0-alpha*alpha):0;
  const T=underdamped?2*Math.PI/omegaD:2*Math.PI/omega0;
  const Imax=U*Math.sqrt(cap/l);

  return {U,L:l,C:cap,R,omega0,alpha,omegaD,T,Imax,underdamped,active:sw.state===1};
}

function drawScope(){

  const ctx=canvas.getContext("2d"); ctx.scale(dpr,dpr); ctx.clearRect(0,0,rect.width,rect.height);
  ctx.strokeStyle=getCss("--grid");ctx.lineWidth=1;
  for(let i=1;i<10;i++){ctx.beginPath();ctx.moveTo(rect.width*i/10,0);ctx.lineTo(rect.width*i/10,rect.height);ctx.stroke()}
  for(let i=1;i<6;i++){ctx.beginPath();ctx.moveTo(0,rect.height*i/6);ctx.lineTo(rect.width,rect.height*i/6);ctx.stroke()}
  const source=state.sim.source, active=state.sim.scopes.filter(s=>state.visibleScopes.includes(s.key));

        if(lc.underdamped){

          const timeWindow=lc.T*6;

          const timeWindow=Math.max(6/Math.max(lc.omega0,1e-9),1);

    <aside class="sidebar">
      <div class="brand"><div class="kicker">Gymnasium Thomaeum</div><h1>Wechselstrom-Labor</h1><p>RLC-Schaltungen, Filter, Schwingkreise, Oszilloskope und Klang</p></div>
      <div class="side-scroll">
        <div class="section-title">Werkzeuge und Bauteile</div><div class="tool-grid">${tools()}</div>
        <div class="section-title">Markiertes Bauteil</div>${selectedPanel()}
        <div class="section-title">Oszilloskop und Ton</div>${scopePanel()}${speakerPanel()}
        <div class="panel">
          <div class="small"><b>Simulation</b><br>${sim.source?`${sim.source.c.type==="dcsource"?`Gleichspannungsquelle: ${fmt(sim.source.c.U,"V")}`:`Quelle: ${fmt(sim.source.c.U,"V")} bei ${fmt(sim.f,"Hz")} · ${sim.source.c.mode==="noise"?"weißes Rauschen":"Sinus"}`}`:"Noch keine Quelle gesetzt."}<br>
          ${sim.source?`Quellenstrom: ${isFinite(sim.totalCurrent)?fmt(sim.totalCurrent,"A"):"Kurzschluss"}`:""}<br>
          ${scopes?`${scopes} Oszilloskop${scopes>1?"e":""} verbaut.`:"Kein Oszilloskop verbaut."}</div>
          <div class="actions">
            <button class="btn" data-action="example-highlow">Hochpass/Tiefpass hören</button>
            <button class="btn" data-action="example-res">langsamer Schwingkreis</button>
            <button class="btn" data-action="freq">Frequenzgang</button>
            <button class="btn" data-action="help">Hilfe</button>
            <button class="btn red" data-action="clear">Alles löschen</button>
            <button class="btn" data-action="theme">${state.light?"Dunkel":"Hell"}</button>
          </div>
        </div>
      </div>
    </aside>
    <main class="main">
      <div class="topbar"><strong>Interaktives AC-Experimentierfeld</strong><div class="top-actions"><span class="badge">${sim.ok?"AC-Auswertung aktiv":"Fehler"}</span></div></div>
      <div class="canvas-wrap" id="wrap">
        ${!sim.ok?`<div class="warning">${sim.msg}</div>`:""}
        <div class="grid" id="grid" style="transform:translate(${state.offset.x}px,${state.offset.y}px) scale(${state.scale})">${renderCells()}</div>
        ${scopes?`<div class="hud"><div class="hud-top"><div><div class="hud-title">Oszilloskop</div><div class="small">Sichtbare Kanäle: ${state.visibleScopes.length?state.visibleScopes.map(k=>{const s=sim.scopes.find(x=>x.key===k);return s?"K"+s.channel:""}).filter(Boolean).join(", "):"keine"}</div></div><span class="badge">${sim.source?.c.mode==="noise"?"Rauschen":"Sinus"}</span></div><canvas class="scope" id="scopeCanvas"></canvas></div>`:""}
        <div class="float"><button class="btn" data-action="zoom-in">+</button><button class="btn" data-action="center">⌖</button><button class="btn" data-action="zoom-out">−</button></div>
      </div>
      ${state.showHelp?helpModal():""}${state.showFreq?freqModal():""}
    </main>
  </div>`;
  bind();
  requestAnimationFrame(()=>{drawScope();drawFreq()});
}
function helpModal(){return `<div class="modal"><div class="modal-card"><h2>Kurzanleitung</h2><ul class="help-list">
<li>Mit „Markieren“ klickst du ein Bauteil an und bekommst links genau dessen Einstellmenü.</li>
<li>Mehrere Oszilloskope sind möglich. Jedes Oszilloskop kann einem Kanal zugeordnet werden. Sichtbar sind nur die im Seitenmenü aktivierten Kanäle.</li>
<li>Mehrere Lautsprecher sind möglich. Im Seitenmenü wählst du, welchen Lautsprecher du hören willst.</li>
<li>Ohne Oszilloskop erscheint keine Oszilloskop-Anzeige. Ohne Lautsprecher gibt es keine Hörfunktion.</li>
<li>Für hörbare Filter wähle das Beispiel „Hochpass/Tiefpass hören“ und schalte im Lautsprecher-Menü zwischen den beiden Lautsprechern um.</li>
<li>Der langsame Schwingkreis wird mit Gleichspannung geladen. Danach trennt der Dreiwegeschalter die Quelle ab und schließt den LC-Kreis. Wenn ein ohmscher Widerstand eingebaut ist, zeigt das Oszilloskop eine gedämpfte Schwingung. Bei zu großem Widerstand geht die Schaltung in ein aperiodisches Abklingen über.</li>
</ul><button class="btn" data-action="help">Schließen</button></div></div>`}
function freqModal(){return `<div class="modal"><div class="modal-card" style="width:min(980px,96vw)"><h2>Frequenzgang der Quelle</h2><canvas class="freq-canvas" id="freqCanvas"></canvas><p class="small" style="margin:14px 0">Der Frequenzgang wird rechnerisch über die Frequenz der Spannungsquelle erzeugt. Wenn Oszilloskop-Kanäle ausgewählt sind, werden diese Kanäle dargestellt. Sonst wird der Gesamtstrom durch die Quelle gezeigt.</p><button class="btn" data-action="freq">Schließen</button></div></div>`}
function bind(){
  document.querySelectorAll("[data-tool]").forEach(b=>b.onclick=()=>setTool(b.dataset.tool));
  document.querySelectorAll("[data-action]").forEach(b=>b.onclick=()=>action(b.dataset.action));
  document.querySelectorAll("[data-edit]").forEach(inp=>inp.onchange=()=>{
    const c=state.cells[state.selected];if(!c)return;
    let val=inp.tagName==="SELECT"?inp.value:parseFloat(inp.value);
    if(inp.dataset.edit==="channel")val=parseInt(val,10);
    c[inp.dataset.edit]=val;evaluate();render();
  });
  document.querySelectorAll("[data-scope]").forEach(cb=>cb.onchange=()=>{
    const k=cb.dataset.scope;
    if(cb.checked&&!state.visibleScopes.includes(k))state.visibleScopes.push(k);
    if(!cb.checked)state.visibleScopes=state.visibleScopes.filter(x=>x!==k);
    render();
  });
  const ss=document.getElementById("speakerSelect");
  if(ss)ss.onchange=()=>{state.audibleSpeaker=ss.value;if(state.audioOn)startAudio();else render()};
  const grid=document.getElementById("grid");
  grid.querySelectorAll(".cell").forEach(el=>{
    el.onpointerdown=e=>{e.stopPropagation();state.drawing=true;place(+el.dataset.x,+el.dataset.y)};
    el.onpointerenter=e=>{if(state.drawing&&(state.tool==="wire"||state.tool==="erase"))place(+el.dataset.x,+el.dataset.y)}
  });
  const wrap=document.getElementById("wrap");
  wrap.onpointerdown=e=>{if(state.tool!=="pan")return;state.dragging=true;};
  wrap.onpointerdown=e=>{if(state.tool!=="pan")return;state.dragging=true;state.dragStart={x:e.clientX-state.offset.x,y:e.clientY-state.offset.y};wrap.setPointerCapture(e.pointerId)};
  wrap.onpointermove=e=>{if(!state.dragging)return;state.offset={x:e.clientX-state.dragStart.x,y:e.clientY-state.dragStart.y};const g=document.getElementById("grid");if(g)g.style.transform=`translate(${state.offset.x}px,${state.offset.y}px) scale(${state.scale})`};
  wrap.onpointerup=e=>{state.dragging=false;state.drawing=false;try{wrap.releasePointerCapture(e.pointerId)}catch(_){}};
  wrap.onpointerleave=()=>{state.dragging=false;state.drawing=false};
  wrap.onwheel=e=>{e.preventDefault();const old=state.scale;state.scale=Math.max(.25,Math.min(2.5,state.scale*(e.deltaY<0?1.12:.89)));const r=wrap.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;state.offset.x=mx-(mx-state.offset.x)*(state.scale/old);state.offset.y=my-(my-state.offset.y)*(state.scale/old);render()},{passive:false};
}
function action(a){
  if(a==="theme"){state.light=!state.light;render()}
  if(a==="clear"){stopAudio();state.cells={};state.selected=null;state.visibleScopes=[];state.audibleSpeaker=null;render()}
  if(a==="help"){state.showHelp=!state.showHelp;render()}
  if(a==="freq"){state.showFreq=!state.showFreq;render()}
  if(a==="audio"){state.audioOn?stopAudio():startAudio();render()}
  if(a==="toggle-switch"){const c=state.cells[state.selected];if(c){c.state=c.state?0:1;render()}}
  if(a==="toggle-threeway"){const c=state.cells[state.selected];if(c){c.state=c.state?0:1;render()}}
  if(a==="zoom-in"){state.scale=Math.min(2.5,state.scale*1.18);render()}
  if(a==="zoom-out"){state.scale=Math.max(.25,state.scale/1.18);render()}
  if(a==="center"){state.offset={x:80,y:70};state.scale=.9;render()}
  if(a==="example-highlow")exampleHighLow();
  if(a==="example-res")exampleResonance();
}
function add(x,y,t,props={}){const c={...defaultCell(t),...props};state.cells[key(x,y)]=c;return c}
function lineH(x1,x2,y){for(let x=x1;x<=x2;x++)add(x,y,"wire")}
function lineV(x,y1,y2){for(let y=y1;y<=y2;y++)add(x,y,"wire")}
function exampleHighLow(){
  stopAudio();state.cells={};state.selected=null;state.visibleScopes=[];state.audibleSpeaker=null;
  add(4,10,"source",{rot:DIR_N,U:5,f:1200,mode:"noise"});
  lineV(4,11,18); lineH(5,15,10); lineH(5,15,18); lineV(16,10,18);
  add(8,10,"resistor",{rot:DIR_E,R:1000});
  add(12,10,"capacitor",{rot:DIR_N,C:0.22e-6});
  add(16,10,"speaker",{rot:DIR_N,R:8});
  add(9,18,"capacitor",{rot:DIR_E,C:0.22e-6});
  add(13,18,"resistor",{rot:DIR_N,R:1000});
  add(16,18,"speaker",{rot:DIR_N,R:8});
  add(15,9,"scope",{rot:DIR_N,channel:1});
  add(15,17,"scope",{rot:DIR_N,channel:2});
  state.selected=key(4,10);state.offset={x:120,y:60};state.scale=.95;render();
}
function exampleResonance(){
  stopAudio();state.cells={};state.selected=null;state.visibleScopes=[];state.audibleSpeaker=null;
  add(5,14,"dcsource",{rot:DIR_N,U:5});
  lineV(5,15,21);
  lineH(6,10,14);
  add(11,14,"threeway",{rot:DIR_E,state:0});
  add(13,14,"ammeter",{rot:DIR_E});
  add(15,14,"inductor",{rot:DIR_E,L:1});
  add(17,14,"capacitor",{rot:DIR_E,C:1});
  add(19,14,"scope",{rot:DIR_E,channel:1});
  lineH(20,22,14);
  lineV(22,14,21);
  lineH(6,21,21);
  state.selected=key(11,14);state.offset={x:95,y:25};state.scale=1;render();
}
window.addEventListener("pointerup",()=>state.drawing=false);
window.addEventListener("resize",()=>requestAnimationFrame(()=>{drawScope();drawFreq()}));
render();
})();
</script>
</body>
</html>
